<style>
  :root{--bg:#f5f2eb;--ink:#1a1814;--ink2:#4a4740;--ink3:#8a857a;--accent:#d45a2a;--border:#ddd8ce;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{overflow-x:hidden;background:var(--bg);color:var(--ink);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
  .num{font-size:120px;font-weight:900;letter-spacing:-.05em;line-height:1;color:var(--accent);margin-bottom:16px;}
  h1{font-size:28px;font-weight:900;margin-bottom:12px;}
  p{font-size:16px;color:var(--ink2);margin-bottom:32px;max-width:400px;}
  .links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn{display:inline-block;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;transition:opacity .2s;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{opacity:.8;}
  .btn-secondary{background:transparent;color:var(--ink2);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--ink);}

    /* ── MENÚ HAMBURGUESA MÓVIL ── */
    .nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:200;}
    .nav-hamburger span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px;transition:all .25s;}
    .nav-hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .nav-hamburger.open span:nth-child(2){opacity:0;}
    .nav-hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    @media(max-width:640px){
      .nav-hamburger{display:flex;}
      .nav-links{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(245,242,235,0.98);backdrop-filter:blur(12px);flex-direction:column;gap:0;padding:8px 0 16px;border-bottom:1px solid var(--border);z-index:99;box-shadow:0 8px 24px rgba(26,24,20,.08);}
      .nav-links.open{display:flex;}
      .nav-links li{width:100%;}
      .nav-links a{display:block;padding:13px 24px;font-size:15px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--border);}
      .nav-links li:last-child a{border-bottom:none;margin:8px 16px 0;border-radius:8px;text-align:center;padding:12px 24px;}
    }
  </style>

<body>
<div class="num">404</div>
<h1>Página no encontrada</h1>
<p>La página que buscas no existe o está en construcción. Vuelve al inicio o explora nuestras herramientas.</p>
<div class="links">
<a class="btn btn-primary" href="/">Ir al inicio →</a>
<a class="btn btn-secondary" href="/herramientas">Ver herramientas</a>
<a class="btn btn-secondary" href="/blog">Ver blog</a>
</div>
<script defer="" src="/cookie-banner.js"></script>
<script>
(function(){
  var btn = document.getElementById('navToggle');
  var menu = document.querySelector('.nav-links');
  if(!btn || !menu) return;
  btn.addEventListener('click', function(){
    btn.classList.toggle('open');
    menu.classList.toggle('open');
  });
  // Cerrar al hacer click en un link
  menu.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      btn.classList.remove('open');
      menu.classList.remove('open');
    });
  });
})();
</script>
</body>
</html>
